{% load static %}
<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Alterar Senha</title>
    <link rel="icon" href="/img/logo.ico" type="image/x-icon">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css" rel="stylesheet">
    <link rel="stylesheet" href="{% static 'css/global.css' %}">
</head>
<body class="login-body" style="background: #f8fafc; background-image: none; animation: none;">
    <div class="card-pass">
        <div class="text-center mb-3">
            <i class="bi bi-shield-lock" style="font-size: 2.5rem; color: #0f172a;"></i>
        </div>
        <h1 class="page-title mb-4">Alterar Senha</h1>

        {% if messages %}
            {% for message in messages %}
                <div class="alert alert-{% if message.tags == 'error' %}danger{% else %}{{ message.tags }}{% endif %} mb-3">
                    {{ message }}
                </div>
            {% endfor %}
        {% endif %}

        <form method="post">
            {% csrf_token %}
            <div class="mb-3">
                <label class="form-label">Nova Senha</label>
                <input type="password" name="nova_senha" class="form-control" placeholder="Mínimo 6 caracteres" required>
            </div>
            <div class="mb-3">
                <label class="form-label">Confirmar Nova Senha</label>
                <input type="password" name="confirmar_senha" class="form-control" required>
            </div>
            <button type="submit" class="btn-exec-pass mt-2">Alterar Senha</button>
        </form>

        <div class="text-center mt-3">
            <a href="javascript:history.back()" class="back-link">
                <i class="bi bi-arrow-left"></i> Voltar
            </a>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
